services:
  zomboid:
    image: renegademaster/zomboid-dedicated-server:latest
    container_name: zomboid-server
    restart: unless-stopped
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - SERVER_PASSWORD=${SERVER_PASSWORD}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MAX_PLAYERS=${MAX_PLAYERS}
      - SERVER_MEMORY=${SERVER_MEMORY}
      - RCON_PASSWORD=${RCON_PASSWORD}
      - RCON_PORT=${RCON_PORT}
      - TZ=${TZ}
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
    entrypoint: ["/bin/bash", "/overrides/entrypoint.sh"]
    ports:
      - "${GAME_PORT}:16261/udp"
      - "${DIRECT_PORT}:16262/udp"
      - "${RCON_PORT}:${RCON_PORT}"
    volumes:
      - server-data:/home/steam/ZomboidDedicatedServer
      - server-saves:/home/steam/Zomboid
      - ./server-config/SandboxVars.lua:/home/steam/Zomboid/Server/${SERVER_NAME}_SandboxVars.lua:ro
      - ./server-config/entrypoint.sh:/overrides/entrypoint.sh:ro
      - ./server-config/overrides.ini:/overrides/overrides.ini:ro
      - ./mods.txt:/overrides/mods.txt
    stdin_open: true
    tty: true

  backup:
    image: alpine:latest
    container_name: zomboid-backup
    restart: unless-stopped
    depends_on:
      - zomboid
    environment:
      - BACKUP_CRON=${BACKUP_CRON}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS}
      - TZ=${TZ}
    volumes:
      - server-saves:/data/saves:ro
      - backups:/data/backups
    entrypoint: /bin/sh
    command:
      - -c
      - |
        apk add --no-cache tzdata
        echo "$${BACKUP_CRON} tar czf /data/backups/zomboid-backup-\$$(date +\%Y\%m\%d-\%H\%M\%S).tar.gz -C /data/saves . && find /data/backups -name '*.tar.gz' -mtime +$${BACKUP_RETENTION_DAYS} -delete" | crontab -
        echo "Backup sidecar started — schedule: $${BACKUP_CRON}, retention: $${BACKUP_RETENTION_DAYS} days"
        crond -f -l 2

  discord:
    build:
      context: ./server-config
      dockerfile: Dockerfile.discord
    container_name: zomboid-discord
    restart: unless-stopped
    depends_on:
      - zomboid
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - DISCORD_STATUS_MSG_ID=${DISCORD_STATUS_MSG_ID}
      - TZ=${TZ}
    volumes:
      - server-saves:/home/steam/Zomboid:ro
      - discord-data:/data

  zombiradar:
    build:
      context: ./src/zombiradar
    container_name: zomboid-zombiradar
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - MODS_FILE=/data/mods.txt
      - STATE_FILE=/data/state.json
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - MOD_MANAGER_URL=${MOD_MANAGER_URL}
      - MOD_MANAGER_ADMINS=${MOD_MANAGER_ADMINS}
    volumes:
      - ./mods.txt:/data/mods.txt
      - mod-manager-data:/data
      - discord-data:/discord-data:ro
    networks:
      lksn: {}

  loki:
    image: grafana/loki:3.4.2
    container_name: zomboid-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      lksn: {}

  promtail:
    image: grafana/promtail:3.4.2
    container_name: zomboid-promtail
    restart: unless-stopped
    depends_on:
      - zomboid
      - loki
    volumes:
      - server-saves:/home/steam/Zomboid:ro
      - ./server-config/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      lksn: {}

  grafana:
    image: grafana/grafana:11.6.0
    container_name: zomboid-grafana
    restart: unless-stopped
    depends_on:
      - loki
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - TZ=${TZ}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./server-config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/loki.yml:ro
    networks:
      lksn: {}

networks:
  lksn:
    external:
      name: lksn

volumes:
  server-data:
  server-saves:
  loki-data:
  grafana-data:
  discord-data:
  mod-manager-data:
  backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./backups
