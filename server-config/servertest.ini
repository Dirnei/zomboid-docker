# Server .ini overrides
#
# Reading speed (minutes per page). Default is 1.0.
# In MP you can't fast-forward, so 1 min/page means a long wait.
# 0.1 = ~6 seconds per page — fast enough to not be painful.
FastReadMultiplier=0.1

# ── Spawn ──
# Where players spawn. Options: 0,0,0 (default Muldraugh), or specific coords.
# SpawnPoint overrides random spawn and puts everyone at the same spot.
# Leave empty for default spawn behavior.
SpawnPoint=8156,11675,0

# SpawnItems — extra items every new character starts with (semicolon-separated).
# Helps noobs survive the first hour.
SpawnItems=Base.Axe;Base.Bag_BigHikingBag;Base.WaterBottleFull;Base.CannedBeans;Base.CannedBeans;Base.Bandage;Base.Bandage;Base.Flashlight;Base.Battery;Base.Lighter

# ── Safehouses ──
# Allow players to claim a building as a safehouse.
PlayerSafehouse=true
# Allow non-members to enter safehouses (true = open, false = locked to members).
SafehouseAllowNonResidential=false
# Allow safehouse owners to kick players who joined their safehouse.
SafehouseAllowTrepass=true
# Allow players to claim safehouses on the first day (no waiting).
SafehouseDaySurvivedToClaim=0
# Allow respawning inside your safehouse instead of a random location.
SafehouseAllowRespawn=true
# How many safehouses a player can own at once.
SafehouseAllowLoot=true
